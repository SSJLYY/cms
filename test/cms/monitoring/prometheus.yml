# ============================================================
# Prometheus 采集配置
# ============================================================

global:
  scrape_interval: 15s       # 每15秒采集一次
  evaluation_interval: 15s   # 每15秒评估告警规则

# 告警管理器（可选，后续配置）
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# 规则文件
rule_files:
  - "alert_rules.yml"

# 采集目标
scrape_configs:

  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot 应用（Micrometer Prometheus Endpoint）
  - job_name: 'resource-platform-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['backend:9090']
    # 生产环境如果 Actuator 需要认证，在此配置
    # basic_auth:
    #   username: admin
    #   password: xxx

  # Redis 监控（如部署 redis_exporter 可启用）
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # MySQL 监控（如部署 mysqld_exporter 可启用）
  # - job_name: 'mysql'
  #   static_configs:
  #     - targets: ['mysql-exporter:9104']
