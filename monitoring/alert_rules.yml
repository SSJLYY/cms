# ============================================================
# Prometheus 告警规则
# ============================================================

groups:
  - name: resource-platform-alerts
    rules:

      # API 错误率告警（5xx 比例超过 1%）
      - alert: HighApiErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
          /
          sum(rate(http_server_requests_seconds_count[5m])) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "API 错误率过高"
          description: "过去5分钟 5xx 错误率 {{ $value | humanizePercentage }}，超过 1% 阈值"

      # API P99 响应时间告警（超过 2 秒）
      - alert: SlowApiResponse
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le, uri)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API 响应时间过长"
          description: "接口 {{ $labels.uri }} P99 响应时间 {{ $value | humanizeDuration }}，超过 2s"

      # 服务熔断告警
      - alert: CircuitBreakerOpen
        expr: resilience4j_circuitbreaker_state{state="open"} == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "服务熔断器打开"
          description: "熔断器 {{ $labels.name }} 已打开，服务降级中"

      # JVM 堆内存使用率告警（超过 85%）
      - alert: HighJvmHeapUsage
        expr: |
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM 堆内存使用率过高"
          description: "JVM 堆内存使用率 {{ $value | humanizePercentage }}，超过 85%"

      # 线程池队列积压告警（爬虫线程池）
      - alert: CrawlerThreadPoolQueueFull
        expr: |
          executor_queue_remaining_tasks{name="crawlerExecutor"} < 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "爬虫线程池队列接近满载"
          description: "爬虫线程池剩余队列容量 {{ $value }}，可能出现任务积压"

      # 应用宕机告警
      - alert: BackendDown
        expr: up{job="resource-platform-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "后端服务不可用"
          description: "resource-platform-backend 已宕机超过 1 分钟"
